# ALLOWED_CHAT_IDS é uma lista de IDs de chat do Telegram separados por
# vírgula. Nesta etapa só há um ID autorizado; quando o bot for multi-tenant
# a lista será expandida (ou substituída por outra forma de autorização).
#
# Os secrets (TELEGRAM_BOT_TOKEN e TELEGRAM_WEBHOOK_SECRET) NÃO ficam aqui.
# São configurados via `wrangler secret put` (produção) e `.dev.vars` (local).

name = "central-controle-bot-dev"
main = "src/index.ts"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]

# Cuenta Cloudflare donde se deploya el Worker (la que tiene Workers Paid).
# Pineado explícito para evitar ambigüedad si el login ve varias cuentas.
account_id = "b10b614b08eeb495d4f32c607ed84d43"

[vars]
ALLOWED_CHAT_IDS = "6739663132"
SHEET_ID = "1KYmyHy_3uaqVMv691bFzlonkkUOwvGJmn0NahRdrXuw"
DRIVE_FOLDER_ID = "1Pkop-z2OsjzcwIH2bEaRu9jhhvr2KB0G"

# AI_GATEWAY_BASE_URL (opcional) — endpoint do Cloudflare AI Gateway para a
# Anthropic. Se setado, /processar manda as chamadas a Sonnet por aí (caché de
# requests + logging de prompts/respostas + tracking de custo); se vazio/ausente,
# o cliente Anthropic vai direto à API.
#
# Como configurar:
#   1. No painel da Cloudflare: AI -> AI Gateway -> criar um gateway (anota o
#      nome e o teu ACCOUNT_ID).
#   2. O endpoint pra Anthropic tem esta forma exata (NÃO acrescente /v1/messages,
#      o SDK faz isso sozinho):
#        https://gateway.ai.cloudflare.com/v1/<ACCOUNT_ID>/<GATEWAY_NAME>/anthropic
#   3. Cola esse endpoint aqui (ou, se preferir não versioná-lo, ponha como
#      secret: `wrangler secret put AI_GATEWAY_BASE_URL`). A ANTHROPIC_API_KEY
#      segue como secret, no header normal — o gateway a reenvia.
AI_GATEWAY_BASE_URL = "https://gateway.ai.cloudflare.com/v1/b10b614b08eeb495d4f32c607ed84d43/cc-bot/anthropic"
